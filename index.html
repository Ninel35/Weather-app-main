<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <title>Weather app</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <header>
        <div class="logo">
          <img
            src="./assets/images/logo.svg"
            alt="logo"
            width="90px"
            height=""
          />
        </div>
        <!-- <label for="select">Units</label> -->
        <div class="units">
          <img
            class="icon-units"
            src="./assets/images/icon-units.svg"
            alt="logo"
            width="15px"
            height="15px"
          />
          <label for="select"></label>
          <select id="select">
            <option value="">Units</option>
            <option value="">Temperature</option>
            <option value="">Celsius (°C)</option>
            <option value="">Fahrenheit (°F)</option>
            <option value="">Wind Speed km/h mph</option>
            <option value="">Precipitation</option>
            <option value="">Millimeters (mm)</option>
            <option value="">Inches (in)</option>
          </select>
        </div>
      </header>

      <h1 class="text-header">How's the sky looking today?</h1>
      <div class="search-field">
        <form class="search-form">
          <label class="label">
            <img
              class="icon-search"
              src="./assets/images/icon-search.svg"
              width="15"
              alt="search"
            />
            <input
              class="search-input"
              type="text"
              placeholder="Search for place..."
            />
          </label>
          <button type="submit">Search</button>
        </form>
      </div>

      <div class="content">
        <div class="left">
          <div class="weather-info temperature"></div>

          <div class="stat-card"></div>
        </div>
        <div class="right">
          <h3>Hourly forecast</h3>

          <select id="select">
            <option value="">Monday</option>
            <option value="">Tuesday</option>
            <option value="">Wednesday</option>
            <option value="">Thursday</option>
            <option value="">Friday</option>
            <option value="">Suturday</option>
            <option value="">Sunday</option>
          </select>
          <ul class="hourly">
            <li class="card-hourly">
              <img
                src="./assets/images/icon-overcast.webp"
                alt="tue"
                width="20px"
                height="20px"
              />
              <span>3 PM</span>
              <span>20°</span>
            </li>
            <li class="card-hourly">
              <img
                src="./assets/images/icon-partly-cloudy.webp"
                alt="tue"
                width="20px"
                height="20px"
              />
              <span>4 PM</span>
              <span>20°</span>
            </li>
            <li class="card-hourly">
              <img
                src="./assets/images/icon-sunny.webp"
                alt="tue"
                width="20px"
                height="20px"
              />
              <span>5 PM</span>
              <span>20°</span>
            </li>
            <li class="card-hourly">
              <img
                src="./assets/images/icon-overcast.webp"
                alt="tue"
                width="20px"
                height="20px"
              />
              <span>6 PM</span>
              <span>19°</span>
            </li>
            <li class="card-hourly">
              <img
                src="./assets/images/icon-snow.webp"
                alt="tue"
                width="20px"
                height="20px"
              />
              <span>7 PM</span>
              <span>18°</span>
            </li>
            <li class="card-hourly">
              <img
                src="./assets/images/icon-fog.webp"
                alt="tue"
                width="20px"
                height="20px"
              />
              <span>8 PM</span>
              <span>18°</span>
            </li>
            <li class="card-hourly">
              <img
                src="./assets/images/icon-snow.webp"
                alt="tue"
                width="20px"
                height="20px"
              />
              <span>9 PM</span>
              <span>17°</span>
            </li>
            <li class="card-hourly">
              <img
                src="./assets/images/icon-snow.webp"
                alt="tue"
                width="20px"
                height="20px"
              />
              <span>10 PM</span>
              <span>17°</span>
            </li>
          </ul>
        </div>
      </div>
    </div>
    <!-- Insert hourly forecast for the selected day here -->
    <script src="./code.js" type="module"></script>
  </body>
</html>
